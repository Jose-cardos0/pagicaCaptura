<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site de captura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          },
        },
      }
    </script>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        background: #0a0a0a;
        min-height: 100vh;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4 sm:p-6">
    <div id="app" class="w-full max-w-[480px]"></div>

    <script>
      ;(function () {
        var STORAGE_SITE = function (id) {
          return 'capture_demo_brandpage_site_v1_' + id
        }

        function qs(name) {
          var p = new URLSearchParams(window.location.search)
          return p.get(name)
        }

        function loadSite(id) {
          try {
            var raw = localStorage.getItem(STORAGE_SITE(id))
            if (!raw) return null
            return JSON.parse(raw)
          } catch (e) {
            return null
          }
        }

        function saveSite(site) {
          localStorage.setItem(STORAGE_SITE(site.id), JSON.stringify(site))
        }

        function parseRgb(hex) {
          var f = { r: 37, g: 211, b: 102 }
          var s = (hex || '').trim()
          if (s.length === 7 && s[0] === '#') {
            return {
              r: parseInt(s.slice(1, 3), 16),
              g: parseInt(s.slice(3, 5), 16),
              b: parseInt(s.slice(5, 7), 16),
            }
          }
          return f
        }

        function pad2(n) {
          return String(n).padStart(2, '0')
        }

        function formatMMSS(sec) {
          var s = Math.max(0, sec | 0)
          return pad2((s / 60) | 0) + ':' + pad2(s % 60)
        }

        function isWa(url) {
          var s = (url || '').trim().toLowerCase()
          if (!s) return false
          try {
            var u = new URL(s)
            var h = u.hostname.toLowerCase()
            return h === 'wa.me' || h.endsWith('whatsapp.com')
          } catch (e) {
            return s.indexOf('wa.me') !== -1 || s.indexOf('whatsapp.com') !== -1
          }
        }

        function injectPixel(pixelId) {
          if (!pixelId || !/^\d{5,20}$/.test(String(pixelId).trim())) return
          var pid = String(pixelId).trim()
          !(function (f, b, e, v, n, t, s) {
            if (f.fbq) return
            n = f.fbq = function () {
              n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments)
            }
            if (!f._fbq) f._fbq = n
            n.push = n
            n.loaded = !0
            n.version = '2.0'
            n.queue = []
            t = b.createElement(e)
            t.async = !0
            t.src = 'https://connect.facebook.net/en_US/fbevents.js'
            s = b.getElementsByTagName(e)[0]
            s.parentNode.insertBefore(t, s)
          })(window, document, 'script')
          fbq('init', pid)
          fbq('track', 'PageView')
        }

        var id = qs('id')
        var root = document.getElementById('app')

        if (!id) {
          root.innerHTML =
            '<div class="rounded-2xl border border-zinc-800 bg-zinc-900 p-8 text-center text-zinc-300">Não foi possível abrir esta página. Use o link copiado na ferramenta de criação do site.</div>'
          return
        }

        var site = loadSite(id)
        if (!site) {
          root.innerHTML =
            '<div class="rounded-2xl border border-zinc-800 bg-zinc-900 p-8 text-center text-zinc-300">Não encontramos esta página. Abra o link a partir do seu painel de sites ou crie um novo.</div>'
          return
        }

        if (site.active === false) {
          root.innerHTML =
            '<div class="rounded-2xl border border-red-500/30 bg-red-950/40 p-8 text-center text-red-200">Este site está desativado.</div>'
          return
        }

        if (site.meta_pixel_id) injectPixel(site.meta_pixel_id)

        site.view_count = (site.view_count || 0) + 1
        site.updated_at = new Date().toISOString()
        saveSite(site)

        var title = (site.title || '').trim() || 'Grupo VIP'
        var desc = (site.description || '').trim() || 'Clique no botão abaixo para acessar.'
        var btnText = (site.buttonText || '').trim() || 'Acessar Grupo Vip'
        var btnUrl = (site.buttonUrl || '').trim()
        var color = site.buttonColor || '#25D366'
        var rgb = parseRgb(color)
        var layout = site.layoutVariant === 'scarcity' ? 'scarcity' : 'icons'
        var logo = site.logoUrl || ''

        var wa = isWa(btnUrl)

        var scarcityHtml = ''
        if (layout === 'scarcity') {
          scarcityHtml =
            '<div id="scarcity-root" class="mt-6 sm:mt-7">' +
            '<div class="rounded-2xl p-px bg-gradient-to-br from-orange-200/60 via-pink-200/40 to-indigo-200/40">' +
            '<div class="rounded-2xl px-4 sm:px-5 py-4 sm:py-5 bg-gradient-to-br from-orange-50 via-white to-pink-50">' +
            '<div class="text-center text-sm sm:text-[15px] font-extrabold tracking-wide text-neutral-900">Vagas Limitadas</div>' +
            '<div class="mt-2 flex items-center justify-center"><div id="scarcity-timer" class="px-4 py-2 rounded-xl font-extrabold text-[22px] sm:text-2xl bg-white/90 border border-black/5 shadow-sm text-neutral-900">03:00</div></div>' +
            '<div class="mt-3"><div class="relative h-9 rounded-xl overflow-hidden bg-white/80 border border-black/5 shadow-sm">' +
            '<div id="scarcity-bar" class="h-full transition-[width] duration-500 ease-out" style="width:80%;background:linear-gradient(90deg,rgba(251,191,36,0.95),rgba(244,63,94,0.9))"></div>' +
            '<div class="absolute inset-0 flex items-center justify-center"><span id="scarcity-spots-label" class="text-[13px] sm:text-sm font-extrabold text-neutral-900">Vagas: 23</span></div></div>' +
            '<div class="mt-2 text-center text-xs text-neutral-600">Garanta sua entrada antes do tempo acabar.</div></div></div></div></div>'
        }

        var iconsHtml = ''
        if (layout === 'icons') {
          iconsHtml =
            '<div class="grid grid-cols-3 gap-3 sm:gap-4 mt-6 sm:mt-7">' +
            '<div class="flex flex-col items-center text-center gap-2"><div class="h-11 w-11 rounded-full flex items-center justify-center bg-[rgb(235,235,235)]"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgb(238,77,45)" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div><span class="text-[11px] sm:text-[12.8px] font-semibold text-neutral-600 whitespace-nowrap">Ofertas Relâmpago</span></div>' +
            '<div class="flex flex-col items-center text-center gap-2"><div class="h-11 w-11 rounded-full flex items-center justify-center bg-[rgb(235,235,235)]"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgb(238,77,45)" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></div><span class="text-[12px] sm:text-[12.8px] font-semibold text-neutral-600">Descontos Reais</span></div>' +
            '<div class="flex flex-col items-center text-center gap-2"><div class="h-11 w-11 rounded-full flex items-center justify-center bg-[rgb(235,235,235)]"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgb(238,77,45)" stroke-width="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg></div><span class="text-[12px] sm:text-[12.8px] font-semibold text-neutral-600">Cupons Diários</span></div>' +
            '</div>'
        }

        var logoHtml = logo
          ? '<div class="flex justify-center mb-6"><div class="h-[130px] w-[130px] rounded-2xl flex items-center justify-center overflow-hidden bg-white"><img src="' +
            logo.replace(/"/g, '&quot;') +
            '" alt="Logo" class="h-full w-full object-contain"/></div></div>'
          : ''

        var iconInner = wa
          ? '<svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
          : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'

        root.innerHTML =
          '<div class="w-full px-4 sm:px-9 py-9 sm:py-11" style="background-color:#FEFDFC;border:1px solid rgba(0,0,0,0.04);border-radius:32px;box-shadow:rgba(31,38,135,0.12) 0px 8px 32px 0px">' +
          logoHtml +
          '<h1 class="text-center font-extrabold leading-tight text-[#1f1f1f] text-[28px] sm:text-[32px]">' +
          escapeHtml(title) +
          '</h1>' +
          '<p class="text-center mt-4 leading-snug max-w-sm mx-auto font-semibold text-[#3c3c3c] text-[16px] sm:text-[17px]">' +
          escapeHtml(desc) +
          '</p>' +
          (layout === 'scarcity' ? scarcityHtml : iconsHtml) +
          '<div class="flex justify-center mt-7 sm:mt-8">' +
          '<a id="cta-btn" href="' +
          escapeAttr(btnUrl) +
          '" rel="noopener noreferrer" class="w-full sm:w-[420px] inline-flex items-center justify-center gap-2 px-6 py-4 font-extrabold text-white rounded-2xl transition-transform duration-200 hover:scale-[1.01]" style="background-color:' +
          escapeAttr(color) +
          ';box-shadow:0 16px 34px rgba(' +
          rgb.r +
          ',' +
          rgb.g +
          ',' +
          rgb.b +
          ',0.28)">' +
          iconInner +
          '<span>' +
          escapeHtml(btnText) +
          '</span></a></div></div>'

        function escapeHtml(t) {
          var d = document.createElement('div')
          d.textContent = t
          return d.innerHTML
        }

        function escapeAttr(t) {
          return String(t)
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
        }

        var cta = document.getElementById('cta-btn')
        if (cta && btnUrl) {
          cta.addEventListener('click', function () {
            var latest = loadSite(id)
            if (!latest) return
            latest.cta_click_count = (latest.cta_click_count || 0) + 1
            latest.updated_at = new Date().toISOString()
            saveSite(latest)
            if (window.fbq) fbq('track', 'Lead')
          })
        } else if (cta) {
          cta.addEventListener('click', function (e) {
            e.preventDefault()
          })
        }

        if (layout === 'scarcity') {
          var secondsLeft = 180
          var spots = 23
          var minSpots = 15
          var initialSpots = 23
          var initialFill = 80
          var timerEl = document.getElementById('scarcity-timer')
          var barEl = document.getElementById('scarcity-bar')
          var spotsLabel = document.getElementById('scarcity-spots-label')

          function tick() {
            if (secondsLeft > 0) secondsLeft -= 1
            if (timerEl) {
              if (secondsLeft > 0) timerEl.textContent = formatMMSS(secondsLeft)
              else {
                timerEl.className =
                  'px-4 py-2 rounded-xl font-extrabold text-base sm:text-lg text-red-600 bg-white/80 border border-black/5'
                timerEl.textContent = 'ENCERRANDO...'
              }
            }
          }

          function decay() {
            if (spots > minSpots) spots -= 1
            var p = (spots / initialSpots) * initialFill
            if (p < 0) p = 0
            if (p > 100) p = 100
            if (barEl) barEl.style.width = p + '%'
            if (spotsLabel) spotsLabel.textContent = 'Vagas: ' + spots
          }

          setInterval(tick, 1000)
          setInterval(decay, 10000)
        }
      })()
    </script>
  </body>
</html>
